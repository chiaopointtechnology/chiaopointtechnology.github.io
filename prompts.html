<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>喬點科技 — 方案中心 Solutions Hub</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Noto+Sans+TC:wght@300;400;500;700&family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Serif+Display&display=swap');

        :root {
            --bg: #f5f2ed;
            --bg-alt: #eae6df;
            --text: #1a1a1a;
            --text-light: #6b6560;
            --text-muted: #9e9790;
            --accent: #c44b2b;
            --accent-light: rgba(196, 75, 43, 0.08);
            --border: #d4cfc8;
            --card: #ffffff;
            --serif: 'DM Serif Display', 'Noto Serif TC', serif;
            --sans: 'Space Grotesk', 'Noto Sans TC', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        ::selection { background: var(--accent); color: #fff; }
        html { scroll-behavior: smooth; }

        body {
            font-family: var(--sans);
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* ===== NAV ===== */
        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            padding: 16px 48px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(245, 242, 237, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }

        .nav-brand {
            font-family: var(--sans);
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text);
        }

        .nav-links {
            display: flex;
            gap: 24px;
            list-style: none;
        }

        .nav-links a {
            color: var(--text-light);
            text-decoration: none;
            font-size: 13px;
            font-weight: 400;
            letter-spacing: 1px;
            transition: color 0.3s;
        }

        .nav-links a:hover { color: var(--accent); }

        /* ===== HERO ===== */
        .hero {
            padding: 140px 48px 60px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .hero-label {
            font-size: 12px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--accent);
            font-weight: 600;
            margin-bottom: 16px;
        }

        .hero h1 {
            font-family: var(--serif);
            font-size: clamp(36px, 5vw, 64px);
            font-weight: 400;
            line-height: 1.15;
            margin-bottom: 20px;
        }

        .hero p {
            font-size: 17px;
            color: var(--text-light);
            max-width: 560px;
            line-height: 1.8;
        }

        /* ===== STATS ===== */
        .stats {
            display: flex;
            gap: 48px;
            margin-top: 40px;
            padding-top: 32px;
            border-top: 1px solid var(--border);
        }

        .stat-item .stat-num {
            font-family: var(--serif);
            font-size: 32px;
            color: var(--accent);
        }

        .stat-item .stat-label {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* ===== SEARCH ===== */
        .search-section {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 48px 40px;
        }

        .search-box {
            position: relative;
            max-width: 480px;
        }

        .search-box input {
            width: 100%;
            padding: 14px 20px 14px 48px;
            font-family: var(--sans);
            font-size: 15px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            outline: none;
            color: var(--text);
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .search-box input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-light);
        }

        .search-box input::placeholder { color: var(--text-muted); }

        .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 18px;
        }

        /* ===== CATEGORY TABS ===== */
        .tabs-section {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 48px 32px;
        }

        .tabs {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .tab {
            padding: 10px 20px;
            font-family: var(--sans);
            font-size: 14px;
            font-weight: 500;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 100px;
            cursor: pointer;
            color: var(--text-light);
            transition: all 0.3s;
        }

        .tab:hover {
            border-color: var(--text-light);
            color: var(--text);
        }

        .tab.active {
            background: var(--text);
            border-color: var(--text);
            color: #fff;
        }

        .tab .tab-count {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            padding: 1px 8px;
            border-radius: 100px;
            font-size: 12px;
            margin-left: 6px;
        }

        .tab.active .tab-count {
            background: rgba(255,255,255,0.2);
        }

        .tab:not(.active) .tab-count {
            background: var(--bg-alt);
        }

        /* ===== PROMPTS GRID ===== */
        .prompts-section {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 48px 80px;
        }

        .category-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        .category-icon {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }

        .category-header h2 {
            font-family: var(--serif);
            font-size: 28px;
            font-weight: 400;
        }

        .category-header .cat-count {
            font-size: 13px;
            color: var(--text-muted);
            margin-left: auto;
        }

        .category-group {
            margin-bottom: 56px;
        }

        .category-group.hidden { display: none; }

        .subcategory-label {
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-muted);
            font-weight: 600;
            margin: 24px 0 12px;
        }

        .prompts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 16px;
        }

        /* ===== PROMPT CARD ===== */
        .prompt-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .prompt-card:hover {
            border-color: var(--text-light);
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.06);
        }

        .prompt-card .card-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .prompt-card .card-title {
            font-weight: 600;
            font-size: 15px;
            line-height: 1.4;
            flex: 1;
        }

        .prompt-card .card-tags {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        .tag {
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 100px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .tag-easy { background: #e8f5e9; color: #2e7d32; }
        .tag-medium { background: #fff3e0; color: #e65100; }
        .tag-advanced { background: #fce4ec; color: #c62828; }
        .tag-type { background: var(--bg-alt); color: var(--text-light); }

        .prompt-card .card-desc {
            font-size: 13px;
            color: var(--text-light);
            line-height: 1.6;
            margin-bottom: 16px;
        }

        .prompt-card .card-prompt {
            background: #faf8f5;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px;
            font-size: 13px;
            line-height: 1.7;
            color: var(--text);
            white-space: pre-wrap;
            max-height: 120px;
            overflow: hidden;
            position: relative;
        }

        .prompt-card .card-prompt.expanded {
            max-height: none;
        }

        .prompt-card .card-prompt::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 40px;
            background: linear-gradient(transparent, #faf8f5);
            pointer-events: none;
        }

        .prompt-card .card-prompt.expanded::after {
            display: none;
        }

        .card-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .btn-copy, .btn-expand {
            padding: 7px 14px;
            font-family: var(--sans);
            font-size: 12px;
            font-weight: 500;
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            background: transparent;
            color: var(--text-light);
        }

        .btn-copy:hover {
            background: var(--text);
            color: #fff;
            border-color: var(--text);
        }

        .btn-copy.copied {
            background: #2e7d32;
            color: #fff;
            border-color: #2e7d32;
        }

        .btn-expand:hover {
            border-color: var(--text-light);
        }

        /* ===== TOAST ===== */
        .toast {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--text);
            color: #fff;
            padding: 14px 28px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            z-index: 200;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: none;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* ===== EMPTY STATE ===== */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-muted);
        }

        .empty-state .empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .empty-state p {
            font-size: 15px;
        }

        /* ===== FOOTER ===== */
        footer {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 48px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--text-muted);
            font-size: 13px;
        }

        footer a {
            color: var(--accent);
            text-decoration: none;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            nav { padding: 14px 20px; }
            .nav-links { display: none; }
            .hero { padding: 100px 20px 40px; }
            .hero h1 { font-size: 32px; }
            .stats { gap: 24px; flex-wrap: wrap; }
            .search-section, .tabs-section, .prompts-section { padding-left: 20px; padding-right: 20px; }
            .prompts-grid { grid-template-columns: 1fr; }
            footer { padding: 32px 20px; flex-direction: column; gap: 12px; }
        }

        /* ===== ANIMATIONS ===== */
        .reveal {
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .reveal.visible {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>

<script>
// ============================================
// PROMPT DATA
// ============================================
const promptData = [
    // ──────────────────────────────────────
    // APP 開發
    // ──────────────────────────────────────
    {
        cat: 'app-dev',
        sub: '建立新頁面',
        title: '建立新的 SwiftUI View',
        desc: '請 AI 在專案中新增一個完整的 SwiftUI 頁面，風格統一。',
        tags: ['easy', 'SwiftUI'],

    {

        tags: ['easy', '除錯'],
        prompt: `這個頁面有問題，截圖如附。

請先讀相關的程式碼，找出問題原因，修改前先跟我確認。`

    {
        cat: 'app-dev',

    {

const catConfig = {
    'app-dev':    { name: 'App 開發',    icon: '{}',  color: '#6366f1', bgColor: 'rgba(99,102,241,0.1)' },
    'app-store':  { name: 'App Store 上架', icon: '&starf;', color: '#0ea5e9', bgColor: 'rgba(14,165,233,0.1)' },
    'website':    { name: '網站製作',    icon: '&lt;/&gt;', color: '#8b5cf6', bgColor: 'rgba(139,92,246,0.1)' },
    'business':   { name: '商業文件',    icon: '&#9998;', color: '#f59e0b', bgColor: 'rgba(245,158,11,0.1)' },
    'marketing':  { name: '行銷社群',    icon: '&#9829;', color: '#ec4899', bgColor: 'rgba(236,72,153,0.1)' },
    'automation': { name: '自動化流程',  icon: '&#9881;', color: '#10b981', bgColor: 'rgba(16,185,129,0.1)' },
    'claude-code': { name: 'Claude Code 指令', icon: '&#9002;', color: '#d97706', bgColor: 'rgba(217,119,6,0.1)' },
    'ai-solutions': { name: 'AI 應用方案', icon: '&#9883;', color: '#0284c7', bgColor: 'rgba(2,132,199,0.1)' },
    'snaporder': { name: 'SnapOrder AI', icon: '&#128230;', color: '#00B894', bgColor: 'rgba(0,184,148,0.1)' },
    'learning': { name: '學習專區', icon: '&#9733;', color: '#14b8a6', bgColor: 'rgba(20,184,166,0.1)' }
};

// ============================================
// RENDER
// ============================================
function render(filter = 'all', search = '') {
    const container = document.getElementById('prompts-container');
    const searchLower = search.toLowerCase();

    // Filter data
    let filtered = promptData.filter(p => {
        const matchCat = filter === 'all' || p.cat === filter;
        const matchSearch = !search ||
            p.title.toLowerCase().includes(searchLower) ||
            p.desc.toLowerCase().includes(searchLower) ||
            p.prompt.toLowerCase().includes(searchLower) ||
            p.tags.some(t => t.toLowerCase().includes(searchLower)) ||
            (p.sub && p.sub.toLowerCase().includes(searchLower));
        return matchCat && matchSearch;
    });

    if (filtered.length === 0) {
        container.innerHTML = `
            <div class="empty-state">
                <div class="empty-icon">&#128269;</div>
                <p>找不到符合的方案，試試其他關鍵字？</p>
            </div>`;
        return;
    }

    // Group by category then subcategory
    const groups = {};
    filtered.forEach(p => {
        if (!groups[p.cat]) groups[p.cat] = {};
        if (!groups[p.cat][p.sub]) groups[p.cat][p.sub] = [];
        groups[p.cat][p.sub].push(p);
    });

    let html = '';
    for (const cat in groups) {
        const cfg = catConfig[cat];
        const catItems = Object.values(groups[cat]).flat();
        html += `<div class="category-group reveal" data-cat="${cat}">`;
        html += `<div class="category-header">
            <div class="category-icon" style="background:${cfg.bgColor};color:${cfg.color}">${cfg.icon}</div>
            <h2>${cfg.name}</h2>
            <span class="cat-count">${catItems.length} 個方案</span>
        </div>`;

        for (const sub in groups[cat]) {
            html += `<div class="subcategory-label">${sub}</div>`;
            html += `<div class="prompts-grid">`;
            groups[cat][sub].forEach((p, idx) => {
                const globalIdx = promptData.indexOf(p);
                const diffTag = p.tags[0];
                const diffClass = diffTag === 'easy' ? 'tag-easy' : diffTag === 'medium' ? 'tag-medium' : 'tag-advanced';
                const diffLabel = diffTag === 'easy' ? '簡單' : diffTag === 'medium' ? '中等' : '進階';
                const typeTag = p.tags[1] || '';

                html += `
                <div class="prompt-card">
                    <div class="card-top">
                        <div class="card-title">${p.title}</div>
                    </div>
                    <div class="card-tags">
                        <span class="tag ${diffClass}">${diffLabel}</span>
                        ${typeTag ? `<span class="tag tag-type">${typeTag}</span>` : ''}
                    </div>
                    <div class="card-desc">${p.desc}</div>
                    <div class="card-prompt" id="prompt-${globalIdx}">${escapeHtml(p.prompt)}</div>
                    <div class="card-actions">
                        <button class="btn-copy" onclick="copyPrompt(${globalIdx}, this)">複製內容</button>
                        <button class="btn-expand" onclick="toggleExpand(${globalIdx}, this)">展開全文</button>
                    </div>
                </div>`;
            });
            html += `</div>`;
        }
        html += `</div>`;
    }

    container.innerHTML = html;

    // Trigger reveal animation
    requestAnimationFrame(() => {
        document.querySelectorAll('.reveal').forEach((el, i) => {
            setTimeout(() => el.classList.add('visible'), i * 100);
        });
    });
}

function escapeHtml(str) {
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ============================================
// ACTIONS
// ============================================
function copyPrompt(idx, btn) {
    const text = promptData[idx].prompt;
    navigator.clipboard.writeText(text).then(() => {
        btn.textContent = '已複製 ✓';
        btn.classList.add('copied');
        showToast('已複製到剪貼簿');
        setTimeout(() => {
            btn.textContent = '複製內容';
            btn.classList.remove('copied');
        }, 2000);
    });
}

function toggleExpand(idx, btn) {
    const el = document.getElementById(`prompt-${idx}`);
    el.classList.toggle('expanded');
    btn.textContent = el.classList.contains('expanded') ? '收合' : '展開全文';
}

function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
}

// ============================================
// TABS & SEARCH
// ============================================
let currentFilter = 'all';

document.getElementById('tabs').addEventListener('click', e => {
    const tab = e.target.closest('.tab');
    if (!tab) return;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentFilter = tab.dataset.cat;
    render(currentFilter, document.getElementById('searchInput').value);
});

document.getElementById('searchInput').addEventListener('input', e => {
    render(currentFilter, e.target.value);
});

// ============================================
// COUNTS
// ============================================
function updateCounts() {
    document.getElementById('total-count').textContent = promptData.length;
    document.getElementById('count-all').textContent = promptData.length;
    for (const cat in catConfig) {
        const count = promptData.filter(p => p.cat === cat).length;
        const el = document.getElementById(`count-${cat}`);
        if (el) el.textContent = count;
    }
}

// ============================================
// INIT
// ============================================
updateCounts();
render();
</script>
