<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>喬點科技 — AI 指令庫 Prompt Library</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Noto+Sans+TC:wght@300;400;500;700&family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Serif+Display&display=swap');

        :root {
            --bg: #f5f2ed;
            --bg-alt: #eae6df;
            --text: #1a1a1a;
            --text-light: #6b6560;
            --text-muted: #9e9790;
            --accent: #c44b2b;
            --accent-light: rgba(196, 75, 43, 0.08);
            --border: #d4cfc8;
            --card: #ffffff;
            --serif: 'DM Serif Display', 'Noto Serif TC', serif;
            --sans: 'Space Grotesk', 'Noto Sans TC', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        ::selection { background: var(--accent); color: #fff; }
        html { scroll-behavior: smooth; }

        body {
            font-family: var(--sans);
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* ===== NAV ===== */
        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            padding: 16px 48px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(245, 242, 237, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }

        .nav-brand {
            font-family: var(--sans);
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text);
        }

        .nav-links {
            display: flex;
            gap: 24px;
            list-style: none;
        }

        .nav-links a {
            color: var(--text-light);
            text-decoration: none;
            font-size: 13px;
            font-weight: 400;
            letter-spacing: 1px;
            transition: color 0.3s;
        }

        .nav-links a:hover { color: var(--accent); }

        /* ===== HERO ===== */
        .hero {
            padding: 140px 48px 60px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .hero-label {
            font-size: 12px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--accent);
            font-weight: 600;
            margin-bottom: 16px;
        }

        .hero h1 {
            font-family: var(--serif);
            font-size: clamp(36px, 5vw, 64px);
            font-weight: 400;
            line-height: 1.15;
            margin-bottom: 20px;
        }

        .hero p {
            font-size: 17px;
            color: var(--text-light);
            max-width: 560px;
            line-height: 1.8;
        }

        /* ===== STATS ===== */
        .stats {
            display: flex;
            gap: 48px;
            margin-top: 40px;
            padding-top: 32px;
            border-top: 1px solid var(--border);
        }

        .stat-item .stat-num {
            font-family: var(--serif);
            font-size: 32px;
            color: var(--accent);
        }

        .stat-item .stat-label {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* ===== SEARCH ===== */
        .search-section {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 48px 40px;
        }

        .search-box {
            position: relative;
            max-width: 480px;
        }

        .search-box input {
            width: 100%;
            padding: 14px 20px 14px 48px;
            font-family: var(--sans);
            font-size: 15px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            outline: none;
            color: var(--text);
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .search-box input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-light);
        }

        .search-box input::placeholder { color: var(--text-muted); }

        .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 18px;
        }

        /* ===== CATEGORY TABS ===== */
        .tabs-section {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 48px 32px;
        }

        .tabs {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .tab {
            padding: 10px 20px;
            font-family: var(--sans);
            font-size: 14px;
            font-weight: 500;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 100px;
            cursor: pointer;
            color: var(--text-light);
            transition: all 0.3s;
        }

        .tab:hover {
            border-color: var(--text-light);
            color: var(--text);
        }

        .tab.active {
            background: var(--text);
            border-color: var(--text);
            color: #fff;
        }

        .tab .tab-count {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            padding: 1px 8px;
            border-radius: 100px;
            font-size: 12px;
            margin-left: 6px;
        }

        .tab.active .tab-count {
            background: rgba(255,255,255,0.2);
        }

        .tab:not(.active) .tab-count {
            background: var(--bg-alt);
        }

        /* ===== PROMPTS GRID ===== */
        .prompts-section {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 48px 80px;
        }

        .category-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        .category-icon {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }

        .category-header h2 {
            font-family: var(--serif);
            font-size: 28px;
            font-weight: 400;
        }

        .category-header .cat-count {
            font-size: 13px;
            color: var(--text-muted);
            margin-left: auto;
        }

        .category-group {
            margin-bottom: 56px;
        }

        .category-group.hidden { display: none; }

        .subcategory-label {
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-muted);
            font-weight: 600;
            margin: 24px 0 12px;
        }

        .prompts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 16px;
        }

        /* ===== PROMPT CARD ===== */
        .prompt-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .prompt-card:hover {
            border-color: var(--text-light);
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.06);
        }

        .prompt-card .card-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .prompt-card .card-title {
            font-weight: 600;
            font-size: 15px;
            line-height: 1.4;
            flex: 1;
        }

        .prompt-card .card-tags {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        .tag {
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 100px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .tag-easy { background: #e8f5e9; color: #2e7d32; }
        .tag-medium { background: #fff3e0; color: #e65100; }
        .tag-advanced { background: #fce4ec; color: #c62828; }
        .tag-type { background: var(--bg-alt); color: var(--text-light); }

        .prompt-card .card-desc {
            font-size: 13px;
            color: var(--text-light);
            line-height: 1.6;
            margin-bottom: 16px;
        }

        .prompt-card .card-prompt {
            background: #faf8f5;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px;
            font-size: 13px;
            line-height: 1.7;
            color: var(--text);
            white-space: pre-wrap;
            max-height: 120px;
            overflow: hidden;
            position: relative;
        }

        .prompt-card .card-prompt.expanded {
            max-height: none;
        }

        .prompt-card .card-prompt::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 40px;
            background: linear-gradient(transparent, #faf8f5);
            pointer-events: none;
        }

        .prompt-card .card-prompt.expanded::after {
            display: none;
        }

        .card-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .btn-copy, .btn-expand {
            padding: 7px 14px;
            font-family: var(--sans);
            font-size: 12px;
            font-weight: 500;
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            background: transparent;
            color: var(--text-light);
        }

        .btn-copy:hover {
            background: var(--text);
            color: #fff;
            border-color: var(--text);
        }

        .btn-copy.copied {
            background: #2e7d32;
            color: #fff;
            border-color: #2e7d32;
        }

        .btn-expand:hover {
            border-color: var(--text-light);
        }

        /* ===== TOAST ===== */
        .toast {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--text);
            color: #fff;
            padding: 14px 28px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            z-index: 200;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: none;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* ===== EMPTY STATE ===== */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-muted);
        }

        .empty-state .empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .empty-state p {
            font-size: 15px;
        }

        /* ===== FOOTER ===== */
        footer {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 48px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--text-muted);
            font-size: 13px;
        }

        footer a {
            color: var(--accent);
            text-decoration: none;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            nav { padding: 14px 20px; }
            .nav-links { display: none; }
            .hero { padding: 100px 20px 40px; }
            .hero h1 { font-size: 32px; }
            .stats { gap: 24px; flex-wrap: wrap; }
            .search-section, .tabs-section, .prompts-section { padding-left: 20px; padding-right: 20px; }
            .prompts-grid { grid-template-columns: 1fr; }
            footer { padding: 32px 20px; flex-direction: column; gap: 12px; }
        }

        /* ===== ANIMATIONS ===== */
        .reveal {
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .reveal.visible {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>

<!-- NAV -->
<nav>
    <div class="nav-brand">ChiaoPoint</div>
    <ul class="nav-links">
        <li><a href="index.html">Organization</a></li>
        <li><a href="office.html">Office</a></li>
        <li><a href="prompts.html" style="color: var(--accent);">Prompts</a></li>
    </ul>
</nav>

<!-- HERO -->
<section class="hero">
    <div class="hero-label">AI Prompt Library</div>
    <h1>AI 指令庫</h1>
    <p>整理好的 AI 指令模板，讓非工程背景也能精準下指令。複製、貼上、完成。不用再來回幾十次。</p>
    <div class="stats">
        <div class="stat-item">
            <div class="stat-num" id="total-count">0</div>
            <div class="stat-label">指令模板</div>
        </div>
        <div class="stat-item">
            <div class="stat-num">6</div>
            <div class="stat-label">分類</div>
        </div>
        <div class="stat-item">
            <div class="stat-num">3</div>
            <div class="stat-label">難度等級</div>
        </div>
    </div>
</section>

<!-- SEARCH -->
<section class="search-section">
    <div class="search-box">
        <span class="search-icon">&#9906;</span>
        <input type="text" id="searchInput" placeholder="搜尋指令... 例如：截圖、build、網站">
    </div>
</section>

<!-- TABS -->
<section class="tabs-section">
    <div class="tabs" id="tabs">
        <button class="tab active" data-cat="all">全部 <span class="tab-count" id="count-all">0</span></button>
        <button class="tab" data-cat="app-dev">App 開發 <span class="tab-count" id="count-app-dev">0</span></button>
        <button class="tab" data-cat="app-store">App Store 上架 <span class="tab-count" id="count-app-store">0</span></button>
        <button class="tab" data-cat="website">網站製作 <span class="tab-count" id="count-website">0</span></button>
        <button class="tab" data-cat="business">商業文件 <span class="tab-count" id="count-business">0</span></button>
        <button class="tab" data-cat="marketing">行銷社群 <span class="tab-count" id="count-marketing">0</span></button>
        <button class="tab" data-cat="automation">自動化流程 <span class="tab-count" id="count-automation">0</span></button>
    </div>
</section>

<!-- PROMPTS -->
<section class="prompts-section" id="prompts-container">
</section>

<!-- TOAST -->
<div class="toast" id="toast">已複製到剪貼簿</div>

<!-- FOOTER -->
<footer>
    <div>喬點科技 ChiaoPoint Technology &copy; 2026</div>
    <div><a href="index.html">組織藍圖</a> &middot; <a href="office.html">虛擬辦公室</a></div>
</footer>

<script>
// ============================================
// PROMPT DATA
// ============================================
const promptData = [
    // ──────────────────────────────────────
    // APP 開發
    // ──────────────────────────────────────
    {
        cat: 'app-dev',
        sub: '建立新頁面',
        title: '建立新的 SwiftUI View',
        desc: '請 AI 在專案中新增一個完整的 SwiftUI 頁面，風格統一。',
        tags: ['easy', 'SwiftUI'],
        prompt: `幫我在這個 SwiftUI 專案中建立一個新的 View，名稱叫「___View」。

要求：
- 風格跟現有的 ReadyView 一致
- 使用專案的 ThemeManager 顏色
- 有返回按鈕 <<<
- 支援多語系（en, zh-Hant, ja, ko, th）
- 先讀現有的程式碼再寫`
    },
    {
        cat: 'app-dev',
        sub: '建立新頁面',
        title: '建立清單頁面（含搜尋）',
        desc: '建立有搜尋功能的列表頁面，帶篩選和排序。',
        tags: ['medium', 'SwiftUI'],
        prompt: `幫我建一個清單頁面，名稱叫「___View」。

功能：
- 頂部有搜尋欄
- 列表顯示項目（圖片 + 標題 + 副標題）
- 可以按分類篩選
- 空狀態要有提示文字
- 風格跟現有專案一致
- 支援多語系`
    },
    {
        cat: 'app-dev',
        sub: '修 Bug',
        title: '用截圖描述 Bug',
        desc: '附上截圖讓 AI 理解問題，最有效的回報方式。',
        tags: ['easy', '除錯'],
        prompt: `這個頁面有問題，截圖如附。

問題描述：[用白話說你看到什麼不對的]
預期行為：[你希望它怎麼運作]

請先讀相關的程式碼，找出問題原因，修改前先跟我確認。`
    },
    {
        cat: 'app-dev',
        sub: '修 Bug',
        title: '功能不work的回報',
        desc: '某個功能按了沒反應或結果不對。',
        tags: ['easy', '除錯'],
        prompt: `「___」功能壞了。

現象：按下 [按鈕/操作] 後，[描述發生了什麼]
正確應該是：[你期望的結果]
在哪個頁面：[頁面名稱]

請先讀該頁面的程式碼，找出原因再修改。改之前先跟我確認。`
    },
    {
        cat: 'app-dev',
        sub: 'UI 調整',
        title: '調整頁面外觀',
        desc: '修改顏色、字體大小、間距等視覺細節。',
        tags: ['easy', 'UI'],
        prompt: `幫我調整「___View」的外觀：

- [要改什麼，例如：標題字太小、間距太寬、顏色要改成___]
- 截圖如附（標註了要改的地方）

改完截圖給我看確認。`
    },
    {
        cat: 'app-dev',
        sub: 'UI 調整',
        title: '照截圖/設計稿做 UI',
        desc: '給 AI 一張截圖或設計稿，請它照做。',
        tags: ['medium', 'UI'],
        prompt: `我要做一個像截圖這樣的畫面（截圖如附）。

請照這個設計做一個 SwiftUI View：
- 整體佈局跟截圖一致
- 用專案現有的配色和字體風格
- 需要的圖片先用 SF Symbols 代替
- 先跟我確認你理解的設計再開始寫`
    },
    {
        cat: 'app-dev',
        sub: '功能開發',
        title: '新增一個功能',
        desc: '請 AI 開發新功能，用白話描述你要什麼。',
        tags: ['medium', '功能'],
        prompt: `我想在 App 裡加一個新功能：「___」

使用情境：[使用者什麼時候會用到這個功能]
功能描述：[用你自己的話描述它做什麼]
參考：[有沒有其他 App 的類似功能可以參考]

請先告訴我你打算怎麼做，我確認後再寫程式碼。`
    },
    {
        cat: 'app-dev',
        sub: '功能開發',
        title: '加入動畫效果',
        desc: '為現有頁面加上轉場或互動動畫。',
        tags: ['medium', '動畫'],
        prompt: `幫我在「___View」加入動畫效果：

我想要的效果：[描述動畫，例如：卡片滑入、淡入淡出、按下會彈跳]
參考：[如果有參考影片或 App 可以描述]
觸發時機：[什麼時候播放動畫，例如：頁面載入時、按下按鈕時]

用 SwiftUI 原生動畫，不要用第三方套件。`
    },
    {
        cat: 'app-dev',
        sub: '資料與後端',
        title: '新增 Firebase 功能',
        desc: '新增 Firestore 讀寫、Auth 或其他 Firebase 功能。',
        tags: ['advanced', 'Firebase'],
        prompt: `我要在 App 中加一個跟 Firebase 相關的功能：

功能：[例如：儲存使用者的 OOO 資料到 Firestore]
資料結構：[你想存什麼欄位]
誰可以讀寫：[所有人 / 只有自己]

請使用專案現有的 Firebase 設定（已有 Auth 和 Firestore）。`
    },
    {
        cat: 'app-dev',
        sub: '多語系',
        title: '新增多語系翻譯',
        desc: '幫新功能加入 5 個語系的翻譯。',
        tags: ['easy', '多語系'],
        prompt: `我剛做了新功能，需要加入多語系翻譯。

需要翻譯的文字：
1. 「___」
2. 「___」
3. 「___」

請幫我更新這 5 個語系的 Localizable.strings：
- en（英文）
- zh-Hant（繁體中文）
- ja（日文）
- ko（韓文）
- th（泰文）`
    },

    // ──────────────────────────────────────
    // APP STORE 上架
    // ──────────────────────────────────────
    {
        cat: 'app-store',
        sub: 'Build 上傳',
        title: 'Build Number +1 並上傳',
        desc: '準備新 Build 上傳到 App Store Connect。',
        tags: ['easy', 'Xcode'],
        prompt: `幫我把 Build Number 加 1（兩個 Target 都要改：PetitAPetit 和 RunningActivityWidget），然後告訴我 Archive 和上傳的步驟。`
    },
    {
        cat: 'app-store',
        sub: 'Build 上傳',
        title: '版本號升級',
        desc: '從 1.x 升到下一個版本。',
        tags: ['easy', 'Xcode'],
        prompt: `幫我把 App 版本從 ___ 升到 ___（兩個 Target 都要改），Build Number 設為 ___。改完告訴我確認。`
    },
    {
        cat: 'app-store',
        sub: '審查回覆',
        title: '回覆 Apple 審查被拒',
        desc: '被 Apple 拒絕後，產生英文回覆訊息。',
        tags: ['easy', '審查'],
        prompt: `App 被 Apple 審查拒絕了，原因如截圖。

請幫我：

// ============================================
// RENDER
// ============================================
function render(filter = 'all', search = '') {
    const container = document.getElementById('prompts-container');
    const searchLower = search.toLowerCase();

    // Filter data
    let filtered = promptData.filter(p => {
        const matchCat = filter === 'all' || p.cat === filter;
        const matchSearch = !search ||
            p.title.toLowerCase().includes(searchLower) ||
            p.desc.toLowerCase().includes(searchLower) ||
            p.prompt.toLowerCase().includes(searchLower) ||
            p.tags.some(t => t.toLowerCase().includes(searchLower)) ||
            (p.sub && p.sub.toLowerCase().includes(searchLower));
        return matchCat && matchSearch;
    });

    if (filtered.length === 0) {
        container.innerHTML = `
            <div class="empty-state">
                <div class="empty-icon">&#128269;</div>
                <p>找不到符合的指令，試試其他關鍵字？</p>
            </div>`;
        return;
    }

    // Group by category then subcategory
    const groups = {};
    filtered.forEach(p => {
        if (!groups[p.cat]) groups[p.cat] = {};
        if (!groups[p.cat][p.sub]) groups[p.cat][p.sub] = [];
        groups[p.cat][p.sub].push(p);
    });

    let html = '';
    for (const cat in groups) {
        const cfg = catConfig[cat];
        const catItems = Object.values(groups[cat]).flat();
        html += `<div class="category-group reveal" data-cat="${cat}">`;
        html += `<div class="category-header">
            <div class="category-icon" style="background:${cfg.bgColor};color:${cfg.color}">${cfg.icon}</div>
            <h2>${cfg.name}</h2>
            <span class="cat-count">${catItems.length} 個指令</span>
        </div>`;

        for (const sub in groups[cat]) {
            html += `<div class="subcategory-label">${sub}</div>`;
            html += `<div class="prompts-grid">`;
            groups[cat][sub].forEach((p, idx) => {
                const globalIdx = promptData.indexOf(p);
                const diffTag = p.tags[0];
                const diffClass = diffTag === 'easy' ? 'tag-easy' : diffTag === 'medium' ? 'tag-medium' : 'tag-advanced';
                const diffLabel = diffTag === 'easy' ? '簡單' : diffTag === 'medium' ? '中等' : '進階';
                const typeTag = p.tags[1] || '';

                html += `
                <div class="prompt-card">
                    <div class="card-top">
                        <div class="card-title">${p.title}</div>
                    </div>
                    <div class="card-tags">
                        <span class="tag ${diffClass}">${diffLabel}</span>
                        ${typeTag ? `<span class="tag tag-type">${typeTag}</span>` : ''}
                    </div>
                    <div class="card-desc">${p.desc}</div>
                    <div class="card-prompt" id="prompt-${globalIdx}">${escapeHtml(p.prompt)}</div>
                    <div class="card-actions">
                        <button class="btn-copy" onclick="copyPrompt(${globalIdx}, this)">複製指令</button>
                        <button class="btn-expand" onclick="toggleExpand(${globalIdx}, this)">展開全文</button>
                    </div>
                </div>`;
            });
            html += `</div>`;
        }
        html += `</div>`;
    }

    container.innerHTML = html;

    // Trigger reveal animation
    requestAnimationFrame(() => {
        document.querySelectorAll('.reveal').forEach((el, i) => {
            setTimeout(() => el.classList.add('visible'), i * 100);
        });
    });
}

function escapeHtml(str) {
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ============================================
// ACTIONS
// ============================================
function copyPrompt(idx, btn) {
    const text = promptData[idx].prompt;
    navigator.clipboard.writeText(text).then(() => {
        btn.textContent = '已複製 ✓';
        btn.classList.add('copied');
        showToast('已複製到剪貼簿');
        setTimeout(() => {
            btn.textContent = '複製指令';
            btn.classList.remove('copied');
        }, 2000);
    });
}

function toggleExpand(idx, btn) {
    const el = document.getElementById(`prompt-${idx}`);
    el.classList.toggle('expanded');
    btn.textContent = el.classList.contains('expanded') ? '收合' : '展開全文';
}

function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
}

// ============================================
// TABS & SEARCH
// ============================================
let currentFilter = 'all';

document.getElementById('tabs').addEventListener('click', e => {
    const tab = e.target.closest('.tab');
    if (!tab) return;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentFilter = tab.dataset.cat;
    render(currentFilter, document.getElementById('searchInput').value);
});

document.getElementById('searchInput').addEventListener('input', e => {
    render(currentFilter, e.target.value);
});

// COUNTS
// ============================================
function updateCounts() {
    document.getElementById('total-count').textContent = promptData.length;
    document.getElementById('count-all').textContent = promptData.length;
    for (const cat in catConfig) {
        const count = promptData.filter(p => p.cat === cat).length;
        const el = document.getElementById(`count-${cat}`);
        if (el) el.textContent = count;
    }
}

// ============================================
// INIT
// ============================================
updateCounts();
render();
</script>

</body>
</html>
