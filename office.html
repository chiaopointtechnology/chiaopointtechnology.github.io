<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>喬點科技 AI 辦公室 — Pixel RPG</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+TC:wght@400;700&display=swap');
        *{margin:0;padding:0;box-sizing:border-box}
        html,body{width:100%;height:100%;background:#0a0a1a;overflow:hidden;display:flex;justify-content:center;align-items:center}
        canvas{image-rendering:pixelated;image-rendering:crisp-edges;display:block}
        #tooltip{position:fixed;display:none;background:rgba(10,10,26,0.96);border:2px solid #4A4A68;padding:12px 16px;font-family:'Noto Sans TC',sans-serif;color:#FFF1E8;font-size:13px;pointer-events:none;z-index:20;min-width:160px;border-radius:2px}
        #tooltip .tt-name{font-size:16px;font-weight:700;margin-bottom:4px}
        #tooltip .tt-role{font-size:11px;color:#83769C;margin-bottom:6px}
        #tooltip .tt-act{font-size:12px;color:#00E436}
    </style>
</head>
<body>
<canvas id="c"></canvas>
<div id="tooltip"><div class="tt-name"></div><div class="tt-role"></div><div class="tt-act"></div></div>
<script>
'use strict';

// ===== CANVAS (wider for task panel) =====
const VW = 640, VH = 340;
const off = document.createElement('canvas');
off.width = VW; off.height = VH;
const g = off.getContext('2d');
g.imageSmoothingEnabled = false;
const canvas = document.getElementById('c');
const dc = canvas.getContext('2d');

let SCALE = 2;
function resize() {
    const dpr = window.devicePixelRatio || 1;
    SCALE = Math.max(1, Math.floor(Math.min(window.innerWidth / VW, window.innerHeight / VH) * dpr));
    canvas.width = VW * SCALE;
    canvas.height = VH * SCALE;
    canvas.style.width = (VW * SCALE / dpr) + 'px';
    canvas.style.height = (VH * SCALE / dpr) + 'px';
    dc.imageSmoothingEnabled = false;
}
resize();
window.addEventListener('resize', resize);

// ===== PALETTE =====
const P = {
    black:'#000000', dkBlue:'#1D2B53', dkPurp:'#7E2553', dkGreen:'#008751',
    brown:'#AB5236', dkGrey:'#5F574F', ltGrey:'#C2C3C7', white:'#FFF1E8',
    red:'#FF004D', orange:'#FFA300', yellow:'#FFEC27', green:'#00E436',
    blue:'#29ADFF', lavend:'#83769C', pink:'#FF77A8', peach:'#FFCCAA',
    bg:'#111128', floor1:'#282845', floor2:'#2E2E4E',
    wall:'#3D3D5E', wallHi:'#50507A', desk:'#9B8365', deskDk:'#7B6345', scr:'#0C1018',
    panelBg:'#0C0C20', panelLine:'#1A1A38',
};

// ===== DEPARTMENTS =====
const DEPTS = [
    { name:'產品設計部', en:'DESIGN',    color:P.pink,   sc:P.blue },
    { name:'AI 工程部',  en:'AI ENG',    color:P.green,  sc:P.green },
    { name:'業務顧問部', en:'BUSINESS',  color:P.orange, sc:P.orange },
    { name:'平台開發部', en:'PLATFORM',  color:P.blue,   sc:P.blue },
    { name:'基礎設施部', en:'INFRA',     color:P.lavend, sc:P.lavend },
    { name:'行銷成長部', en:'MARKETING', color:P.yellow, sc:P.yellow },
];

// ===== CHARACTERS =====
const CHARS = [
    { name:'小雅', role:'UI/UX 設計師',  dept:0, hair:P.pink,    shirt:'#D94070' },
    { name:'阿凱', role:'產品經理',       dept:0, hair:P.brown,   shirt:P.dkGrey },
    { name:'小美', role:'內容策略師',     dept:0, hair:'#2A2A4A', shirt:P.lavend },
    { name:'阿傑', role:'ML 工程師',     dept:1, hair:P.blue,    shirt:P.dkBlue },
    { name:'小智', role:'Agent 開發者',  dept:1, hair:'#20A050', shirt:P.dkGreen },
    { name:'阿倫', role:'Prompt 工程師', dept:1, hair:P.yellow,  shirt:P.brown },
    { name:'阿德', role:'業務主管',       dept:2, hair:'#2A2A4A', shirt:P.brown },
    { name:'小琳', role:'AI 顧問',       dept:2, hair:'#8B5E3C', shirt:P.pink },
    { name:'阿強', role:'專案經理',       dept:2, hair:P.ltGrey,  shirt:P.dkGrey },
    { name:'小軒', role:'前端工程師',     dept:3, hair:P.dkPurp,  shirt:P.blue },
    { name:'阿豪', role:'後端工程師',     dept:3, hair:'#3A2A1A', shirt:P.dkBlue },
    { name:'小芸', role:'整合工程師',     dept:3, hair:P.yellow,  shirt:P.dkGreen },
    { name:'阿達', role:'雲端架構師',     dept:4, hair:P.blue,    shirt:P.lavend },
    { name:'小安', role:'安全工程師',     dept:4, hair:P.red,     shirt:P.dkBlue },
    { name:'小薰', role:'數位行銷師',     dept:5, hair:P.dkPurp,  shirt:'#C4A820' },
    { name:'阿翔', role:'內容創作者',     dept:5, hair:P.orange,  shirt:P.blue },
];

// ===== ACTIVITIES =====
const ACTS = [
    ['設計使用者介面','完成原型測試','分析用戶回饋','更新設計系統','製作行銷素材','建立 Wireframe'],
    ['訓練 AI 模型','優化 RAG 引擎','開發 Agent','完成 Prompt 模板','微調 LLM','建構知識圖譜'],
    ['發送客戶提案','完成 AI 評估報告','準備客戶簡報','處理新客戶需求','分析客戶資料','撰寫 RFP 回覆'],
    ['部署前端更新','修復 API Bug','開發新功能','程式碼審查','整合第三方服務','優化資料庫查詢'],
    ['優化雲端架構','執行安全掃描','監控系統效能','更新 CI/CD','成本優化分析','設定自動擴展'],
    ['發布社群貼文','分析廣告成效','撰寫部落格文章','更新 SEO 策略','排程電子報','建立行銷漏斗'],
];

// ===== ROOM LAYOUT =====
const PANEL_X = 478, PANEL_W = 160;
const RW = 152, RH = 132, GAP = 5, TOP_H = 24, BOT_H = 22;
const rooms = DEPTS.map((d, i) => ({
    ...d, idx: i,
    x: 5 + (i % 3) * (RW + GAP),
    y: TOP_H + 2 + Math.floor(i / 3) * (RH + GAP),
    w: RW, h: RH,
}));

CHARS.forEach(ch => {
    const siblings = CHARS.filter(c => c.dept === ch.dept);
    const idx = siblings.indexOf(ch);
    const count = siblings.length;
    const room = rooms[ch.dept];
    ch.rx = Math.floor(room.w / (count + 1) * (idx + 1)) - 5;
    ch.ry = 56;
    ch.phase = Math.random() * 1000;
    ch.speed = 0.7 + Math.random() * 0.6;
    ch.act = ACTS[ch.dept][0];
});

// ===== TASK SYSTEM =====
let tasks = [];
function newTask() {
    const ch = CHARS[Math.floor(Math.random() * CHARS.length)];
    const act = ACTS[ch.dept][Math.floor(Math.random() * ACTS[ch.dept].length)];
    ch.act = act;
    tasks.unshift({
        name: ch.name,
        act: act,
        dept: ch.dept,
        color: DEPTS[ch.dept].color,
        status: 'active',   // 'active' | 'done'
        birth: frame,
        doneAt: 0,
        progress: 0,
    });
    if (tasks.length > 14) tasks.pop();
}
function updateTasks() {
    // Start new tasks
    if (frame % 90 === 0) newTask();
    // Progress active tasks → done
    tasks.forEach(t => {
        if (t.status === 'active') {
            t.progress = Math.min(1, (frame - t.birth) / (180 + (t.birth % 200)));
            if (t.progress >= 1) {
                t.status = 'done';
                t.doneAt = frame;
            }
        }
    });
    // Remove old done tasks
    tasks = tasks.filter(t => !(t.status === 'done' && frame - t.doneAt > 600));
}

// ===== STATE =====
let frame = 0, particles = [];

// ===== DRAW HELPERS =====
function fill(x, y, w, h, c) { g.fillStyle = c; g.fillRect(Math.floor(x), Math.floor(y), w, h); }
function txt(s, x, y, sz, c, al) {
    g.fillStyle = c || P.white;
    g.font = 'bold ' + sz + 'px "Noto Sans TC",sans-serif';
    g.textAlign = al || 'left'; g.textBaseline = 'top';
    g.fillText(s, Math.floor(x), Math.floor(y));
}
function txtP(s, x, y, sz, c, al) {
    g.fillStyle = c || P.white;
    g.font = sz + 'px "Press Start 2P",monospace';
    g.textAlign = al || 'left'; g.textBaseline = 'top';
    g.fillText(s, Math.floor(x), Math.floor(y));
}

// ===== CHARACTER SPRITE =====
function drawChar(x, y, ch, f) {
    const skin = P.peach, skinDk = '#E6A87A', eye = '#111128', pants = P.dkBlue;
    const t = Math.floor((f * ch.speed + ch.phase) / 14) % 2;
    fill(x-1, y+12, 12, 2, 'rgba(0,0,0,0.3)');
    fill(x+2, y, 6, 1, ch.hair); fill(x+1, y+1, 8, 2, ch.hair); fill(x, y+3, 10, 1, ch.hair);
    fill(x+1, y+4, 8, 3, skin);
    fill(x+2, y+4, 2, 2, P.white); fill(x+6, y+4, 2, 2, P.white);
    fill(x+3, y+5, 1, 1, eye); fill(x+7, y+5, 1, 1, eye);
    fill(x+4, y+6, 2, 1, skinDk);
    fill(x+1, y+7, 8, 3, ch.shirt); fill(x+4, y+7, 2, 1, skin);
    if (t===0) { fill(x-1,y+8,2,2,skin); fill(x+9,y+8,2,2,skin); }
    else { fill(x-1,y+7,2,2,skin); fill(x+9,y+9,2,1,skin); }
    fill(x+2, y+10, 6, 2, pants);
    fill(x+2, y+12, 3, 1, pants); fill(x+5, y+12, 3, 1, pants);
}

// ===== FURNITURE =====
function drawDesk(x, y) {
    fill(x,y,24,3,P.desk); fill(x,y+3,24,1,P.deskDk);
    fill(x+1,y+4,2,4,P.deskDk); fill(x+21,y+4,2,4,P.deskDk);
}
function drawMonitor(x, y, sc, f, seed) {
    fill(x,y,12,10,'#22223A'); fill(x+1,y+1,10,8,'#080812');
    for (let i=0;i<5;i++) {
        const h=((seed*37+i*17+Math.floor(f/10))*2654435761)>>>0;
        const w=(h%6)+2;
        if((h>>3)%3!==0) fill(x+2,y+2+i*1.5,Math.min(w,8),1,sc);
    }
    g.globalAlpha=0.08+Math.sin(f*0.04+seed)*0.04;
    fill(x-2,y-2,16,14,sc); g.globalAlpha=1;
    fill(x+5,y+10,2,2,'#22223A');
}
function drawPlant(x,y) {
    fill(x+1,y+5,4,3,'#7B4A23'); fill(x,y+8,6,1,'#7B4A23');
    fill(x+2,y,2,2,P.dkGreen); fill(x,y+2,6,2,P.green); fill(x+1,y+4,4,1,P.dkGreen);
}
function drawServer(x,y,f) {
    fill(x,y,10,20,'#1E1E36'); fill(x+1,y,8,1,'#2E2E4E');
    for(let i=0;i<5;i++){
        fill(x+1,y+2+i*4,8,3,P.dkBlue); fill(x+2,y+3+i*4,4,1,'#141430');
        const b=Math.floor((f+i*19)/18)%5;
        fill(x+7,y+2+i*4,2,1,b===0?P.green:'#0C2210');
        fill(x+7,y+4+i*4,2,1,(b+2)%5===0?P.orange:'#221208');
    }
}
function drawWhiteboard(x,y,c) {
    fill(x,y,22,14,P.white); fill(x,y,22,1,P.ltGrey); fill(x,y+13,22,1,P.ltGrey);
    fill(x+2,y+3,6,2,c); fill(x+2,y+6,12,1,P.ltGrey); fill(x+2,y+8,10,1,P.ltGrey);
    fill(x+2,y+10,8,1,P.ltGrey); fill(x+12,y+3,5,4,c);
}
function drawChart(x,y,c,f) {
    fill(x,y,18,14,'#0E0E22');
    const bars=[3,8,5,10,6,9,4,7];
    for(let i=0;i<7;i++){const bh=bars[(i+Math.floor(f/80))%8]; fill(x+2+i*2,y+13-bh,1,bh,c);}
}
function drawCoffeeMug(x,y,f) {
    fill(x,y+2,4,4,'#9B6E3C'); fill(x+4,y+3,2,2,'#9B6E3C'); fill(x+1,y+1,2,1,'#6B4E2C');
    if(Math.floor(f/30)%2===0) fill(x+1,y-1,1,1,'rgba(200,200,220,0.3)');
}
function drawChair(x,y) {
    fill(x+1,y,8,1,'#3A2020'); fill(x,y+1,10,2,'#4A2828'); fill(x+1,y+3,8,1,'#3A2020');
}

// ===== WORKSTATION =====
function drawWorkstation(rx,ry,ch,f,sc) {
    drawMonitor(rx-1,ry-12,sc,f,Math.floor(ch.phase*100));
    drawDesk(rx-7,ry); drawChair(rx-1,ry+8); drawChar(rx,ry+6,ch,f);
    txt(ch.name,rx+5,ry+22,8,P.white,'center');
}

// ===== ROOM =====
function drawRoom(room, f) {
    const {x,y,w,h,color,sc,idx} = room;
    for(let ty=0;ty<h;ty+=8) for(let tx=0;tx<w;tx+=8)
        fill(x+tx,y+ty,8,8,((tx+ty)/8)%2===0?P.floor1:P.floor2);
    fill(x,y,w,3,P.wallHi); fill(x,y,3,h,P.wall); fill(x+w-3,y,3,h,P.wall); fill(x,y+h-3,w,3,P.wall);
    fill(x,y,3,3,P.wallHi); fill(x+w-3,y,3,3,P.wallHi); fill(x,y+h-3,3,3,P.wallHi); fill(x+w-3,y+h-3,3,3,P.wallHi);
    fill(x+Math.floor(w/2)-5,y+h-3,10,3,P.brown); fill(x+Math.floor(w/2)-4,y+h-2,8,1,'#C49A6C');
    fill(x+4,y+4,w-8,15,'rgba(0,0,0,0.65)'); fill(x+4,y+4,3,15,color);
    txt(room.name,x+10,y+6,9,color);
    const led=Math.floor((f+idx*30)/22)%4;
    fill(x+w-12,y+8,4,4,led===0?P.green:'#0C2210');
    switch(idx){
        case 0: drawWhiteboard(x+w-30,y+22,color); drawPlant(x+6,y+h-16); drawCoffeeMug(x+w-12,y+h-12,f); break;
        case 1: drawServer(x+w-16,y+24,f); drawPlant(x+6,y+h-16); break;
        case 2: drawChart(x+w-26,y+24,color,f); drawPlant(x+6,y+22); drawCoffeeMug(x+w-12,y+h-12,f); break;
        case 3: drawWhiteboard(x+6,y+22,color); drawPlant(x+w-12,y+h-16); break;
        case 4: drawServer(x+w-16,y+24,f); drawServer(x+w-28,y+24,f+12); break;
        case 5: drawChart(x+6,y+24,color,f); drawPlant(x+w-12,y+h-16); drawCoffeeMug(x+18,y+26,f); break;
    }
    CHARS.filter(c=>c.dept===idx).forEach(ch=>drawWorkstation(x+ch.rx,y+ch.ry,ch,f,sc));
    CHARS.filter(c=>c.dept===idx).forEach(ch=>{
        const bp=Math.floor((f+ch.phase*7)/260)%10;
        if(bp===0){
            const bx=x+ch.rx+11,by=y+ch.ry+1;
            fill(bx,by+6,2,2,P.white); fill(bx+2,by+3,2,2,P.white);
            fill(bx+3,by-5,14,9,P.white); fill(bx+4,by-6,12,1,P.white); fill(bx+4,by+4,12,1,P.white);
            txt(['!','AI','OK'][Math.floor(ch.phase)%3],bx+7,by-4,7,P.red,'center');
        }
    });
}

// ===== PARTICLES =====
function spawnParticle() {
    const a=Math.floor(Math.random()*6); let b; do{b=Math.floor(Math.random()*6)}while(b===a);
    const ra=rooms[a],rb=rooms[b];
    particles.push({sx:ra.x+ra.w/2,sy:ra.y+ra.h/2,tx:rb.x+rb.w/2,ty:rb.y+rb.h/2,t:0,spd:0.005+Math.random()*0.007,color:ra.color,trail:[]});
}
function updateParticles() {
    particles=particles.filter(p=>{
        p.t+=p.spd;
        const px=p.sx+(p.tx-p.sx)*p.t, py=p.sy+(p.ty-p.sy)*p.t+Math.sin(p.t*Math.PI)*-20;
        p.trail.push({x:px,y:py}); if(p.trail.length>6)p.trail.shift(); return p.t<1;
    });
    if(Math.random()<0.025) spawnParticle();
}
function drawParticles() {
    particles.forEach(p=>{
        p.trail.forEach((pt,i)=>{g.globalAlpha=(i+1)/p.trail.length*0.5;fill(pt.x-1,pt.y-1,3,3,p.color);});
        g.globalAlpha=1;
        const px=p.sx+(p.tx-p.sx)*p.t, py=p.sy+(p.ty-p.sy)*p.t+Math.sin(p.t*Math.PI)*-20;
        fill(px-1,py-1,4,4,P.white); fill(px,py,2,2,p.color);
    });
}

// ===== TASK PANEL (right side) =====
function drawTaskPanel(f) {
    const px = PANEL_X, py = 0, pw = PANEL_W + 2, ph = VH;

    // Background
    fill(px, py, pw, ph, P.panelBg);
    fill(px, py, 1, ph, P.wallHi);

    // Header
    fill(px+1, 0, pw-1, TOP_H, '#0A0A1C');
    fill(px+1, TOP_H-1, pw-1, 1, P.panelLine);
    txtP('TASKS', px+10, 7, 6, P.orange);

    // Active count
    const activeCount = tasks.filter(t => t.status === 'active').length;
    const doneCount = tasks.filter(t => t.status === 'done').length;
    txtP(activeCount+'', px+pw-36, 5, 5, P.green);
    fill(px+pw-24, 6, 3, 3, P.green);
    txtP(doneCount+'', px+pw-18, 5, 5, P.dkGrey);
    fill(px+pw-6, 6, 3, 3, P.dkGrey);

    // Scrolling task list
    const startY = TOP_H + 4;
    const rowH = 22;
    const maxVisible = Math.floor((ph - TOP_H - 8) / rowH);
    const visibleTasks = tasks.slice(0, maxVisible);

    visibleTasks.forEach((t, i) => {
        const ty = startY + i * rowH;
        const isNew = f - t.birth < 20;

        // Row background (subtle highlight for active)
        if (t.status === 'active') {
            fill(px+2, ty, pw-4, rowH-2, 'rgba(255,255,255,0.02)');
        }

        // Department color bar (left edge)
        fill(px+3, ty+1, 2, rowH-4, t.color);

        // Status indicator
        if (t.status === 'active') {
            // Spinning dots animation
            const spin = Math.floor(f / 6) % 4;
            const dots = [[0,0],[3,0],[3,3],[0,3]];
            fill(px+8, ty+2, 6, 6, 'rgba(0,0,0,0.3)');
            for (let d = 0; d < 4; d++) {
                const bright = d === spin ? 1 : 0.2;
                g.globalAlpha = bright;
                fill(px+8+dots[d][0], ty+2+dots[d][1], 2, 2, t.color);
            }
            g.globalAlpha = 1;

            // Progress bar
            const barW = Math.floor(t.progress * (pw - 24));
            fill(px+8, ty+rowH-5, pw-24, 2, P.panelLine);
            fill(px+8, ty+rowH-5, barW, 2, t.color);
        } else {
            // Checkmark
            fill(px+8, ty+2, 7, 7, 'rgba(0,228,54,0.15)');
            fill(px+9, ty+5, 1, 2, P.green);
            fill(px+10, ty+6, 1, 1, P.green);
            fill(px+11, ty+5, 1, 1, P.green);
            fill(px+12, ty+4, 1, 1, P.green);
            fill(px+13, ty+3, 1, 1, P.green);
        }

        // Character name
        const nameColor = t.status === 'active' ? P.white : P.dkGrey;
        txt(t.name, px+18, ty+1, 8, nameColor);

        // Activity text
        const actColor = t.status === 'active' ? P.ltGrey : '#3A3A52';
        const actText = t.act.length > 8 ? t.act.substring(0, 8) + '..' : t.act;
        txt(actText, px+18, ty+11, 6, actColor);

        // Status label (right side)
        if (t.status === 'active') {
            txtP('...', px+pw-18, ty+3, 4, t.color);
        } else {
            txtP('OK', px+pw-18, ty+3, 4, '#0A5020');
        }

        // Separator line
        fill(px+6, ty+rowH-2, pw-14, 1, P.panelLine);

        // New task flash
        if (isNew) {
            g.globalAlpha = 1 - (f - t.birth) / 20;
            fill(px+2, ty, pw-4, rowH-2, t.color);
            g.globalAlpha = 1;
        }
    });

    // Bottom stats
    const by = VH - BOT_H;
    fill(px+1, by, pw-1, BOT_H, '#08081A');
    fill(px+1, by, pw-1, 1, P.panelLine);
    txtP(CHARS.length + ' STAFF', px+10, by+5, 4, P.ltGrey);
    txtP('6 DEPT', px+10, by+13, 4, P.ltGrey);

    // Total completed counter
    const totalDone = tasks.filter(t => t.status === 'done').length;
    txtP('DONE:' + totalDone, px+pw-52, by+5, 4, P.green);
}

// ===== UI BARS =====
function drawTopBar(f) {
    fill(0, 0, PANEL_X, TOP_H, P.bg);
    fill(0, TOP_H-1, PANEL_X, 1, P.wallHi);
    txt('喬點科技 AI 辦公室', 8, 5, 11, P.white);
    const blink = Math.floor(f/18)%2;
    fill(PANEL_X-48, 7, 5, 5, blink ? P.green : '#0C2210');
    txtP('LIVE', PANEL_X-40, 9, 5, P.green);
    const d = new Date();
    txtP(String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'), PANEL_X-40, 17, 3, P.ltGrey);
}

function drawBottomBar(f) {
    const by = VH - BOT_H;
    fill(0, by, PANEL_X, BOT_H, P.bg);
    fill(0, by, PANEL_X, 1, P.wallHi);
    // Latest activity
    if (tasks.length > 0) {
        const latest = tasks.find(t => t.status === 'active') || tasks[0];
        fill(6, by+6, 4, 4, latest.color);
        txt(latest.name + ' ' + latest.act, 16, by+5, 9, P.green);
    }
    // Seconds counter
    const sec = Math.floor(f / 60);
    txtP('T+' + String(Math.floor(sec/60)).padStart(2,'0') + ':' + String(sec%60).padStart(2,'0'), PANEL_X-60, by+7, 4, P.dkGrey);
}

// ===== TOOLTIP =====
const tooltip = document.getElementById('tooltip');
canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    const mx = (e.clientX - rect.left) * VW / rect.width;
    const my = (e.clientY - rect.top) * VH / rect.height;
    let found = null;
    for (const ch of CHARS) {
        const room = rooms[ch.dept];
        const cx = room.x + ch.rx - 2, cy = room.y + ch.ry;
        if (mx>=cx && mx<=cx+16 && my>=cy && my<=cy+28) { found=ch; break; }
    }
    if (found) {
        tooltip.style.display = 'block';
        tooltip.style.left = (e.clientX+16)+'px'; tooltip.style.top = (e.clientY-10)+'px';
        tooltip.querySelector('.tt-name').textContent = found.name;
        tooltip.querySelector('.tt-role').textContent = DEPTS[found.dept].name+' — '+found.role;
        tooltip.querySelector('.tt-act').textContent = '> '+found.act;
        tooltip.style.borderColor = DEPTS[found.dept].color;
    } else tooltip.style.display = 'none';
});
canvas.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; });

// ===== MAIN LOOP =====
function gameLoop() {
    fill(0, 0, VW, VH, P.bg);
    rooms.forEach(r => drawRoom(r, frame));
    drawParticles();
    drawTaskPanel(frame);
    drawTopBar(frame);
    drawBottomBar(frame);
    dc.drawImage(off, 0, 0, canvas.width, canvas.height);
    updateParticles();
    updateTasks();
    frame++;
    requestAnimationFrame(gameLoop);
}

// Seed initial tasks
for (let i = 0; i < 6; i++) {
    const ch = CHARS[i * 2];
    const act = ACTS[ch.dept][Math.floor(Math.random() * ACTS[ch.dept].length)];
    ch.act = act;
    tasks.push({
        name: ch.name, act: act, dept: ch.dept, color: DEPTS[ch.dept].color,
        status: i < 3 ? 'active' : 'done', birth: -(200 - i * 30), doneAt: i >= 3 ? -50 : 0, progress: i < 3 ? Math.random()*0.6 : 1,
    });
}

document.fonts.ready.then(() => { resize(); gameLoop(); });
</script>
