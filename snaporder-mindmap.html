// ============ LAYOUT: Horizontal Tree ============
const NODE_H = 30;
const LEVEL_GAP = [0, 260, 220, 190];
const SIBLING_GAP = 6;

function measureNode(node) {
  const cjk = (node.label.replace(/\n/g,'').match(/[\u4e00-\u9fff\uff00-\uffef]/g) || []).length;
  const ascii = node.label.replace(/\n/g,'').length - cjk;
  node._w = Math.max(120, cjk * 13.5 + ascii * 7 + 36);
  node._h = node.label.includes('\n') ? 50 : NODE_H;
}

// Pass 1: compute subtree heights
function computeHeight(node, depth) {
  node._depth = depth;
  measureNode(node);
  if (!node.children || !node.children.length) {
    node._subtreeH = node._h;
    return node._subtreeH;
  }
  let total = 0;
  node.children.forEach(c => { total += computeHeight(c, depth + 1); });
  total += (node.children.length - 1) * SIBLING_GAP;
  node._subtreeH = Math.max(node._h, total);
  return node._subtreeH;
}

// Pass 2: assign positions
function assignPositions(node, x, yCenter) {
  node.x = x;
  node.y = yCenter;
  if (!node.children || !node.children.length) return;
  const gap = LEVEL_GAP[Math.min(node._depth + 1, LEVEL_GAP.length - 1)];
  const childX = x + gap;
  let totalH = 0;
  node.children.forEach(c => { totalH += c._subtreeH; });
  totalH += (node.children.length - 1) * SIBLING_GAP;
  let curY = yCenter - totalH / 2;
  node.children.forEach(c => {
    const cy = curY + c._subtreeH / 2;
    assignPositions(c, childX, cy);
    curY += c._subtreeH + SIBLING_GAP;
  });
}

// ============ RENDER ============
const svg = document.getElementById('mindmap');
const NS = 'http://www.w3.org/2000/svg';
let currentTab = 'single';
let viewBox = { x: 0, y: 0, w: 0, h: 0 };

function updateViewBox() {
  svg.setAttribute('viewBox', `${viewBox.x} ${viewBox.y} ${viewBox.w} ${viewBox.h}`);
}

function getBounds(node) {
  let minX = node.x - node._w/2, maxX = node.x + node._w/2;
  let minY = node.y - node._h/2, maxY = node.y + node._h/2;
  if (node.children) node.children.forEach(c => {
    const b = getBounds(c);
    minX = Math.min(minX, b.minX); maxX = Math.max(maxX, b.maxX);
    minY = Math.min(minY, b.minY); maxY = Math.max(maxY, b.maxY);
  });
  return { minX, maxX, minY, maxY };
}

function drawLink(parent, child) {
  const x1 = parent.x + parent._w / 2;
  const y1 = parent.y;
  const x2 = child.x - child._w / 2;
  const y2 = child.y;
  const mx = (x1 + x2) / 2;
  const path = document.createElementNS(NS, 'path');
  path.setAttribute('class', 'link');
  path.setAttribute('d', `M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}`);
  path.setAttribute('stroke', child.color);
  path.setAttribute('stroke-opacity', '0.45');
  svg.appendChild(path);
}

function drawNode(node) {
  const g = document.createElementNS(NS, 'g');
  g.setAttribute('class', 'node-group');
  g.setAttribute('transform', `translate(${node.x},${node.y})`);

  const isRoot = node._depth === 0;
  const isL1 = node._depth === 1;

  const rect = document.createElementNS(NS, 'rect');
  rect.setAttribute('class', 'node-rect');
  rect.setAttribute('x', -node._w/2);
  rect.setAttribute('y', -node._h/2);
  rect.setAttribute('width', node._w);
  rect.setAttribute('height', node._h);
  rect.setAttribute('fill', node.color);
  rect.setAttribute('opacity', node._depth >= 3 ? 0.65 : 0.88);
  g.appendChild(rect);

  const lines = node.label.split('\n');
  lines.forEach((line, i) => {
    const text = document.createElementNS(NS, 'text');
    text.setAttribute('class', 'node-text');
    text.setAttribute('text-anchor', 'middle');
    text.setAttribute('dominant-baseline', 'central');
    const fs = isRoot ? 15 : isL1 ? 12.5 : 11;
    text.setAttribute('font-size', fs + 'px');
    text.setAttribute('font-weight', isRoot ? 700 : isL1 ? 600 : 400);
    const yOff = lines.length > 1 ? (i - (lines.length-1)/2) * (fs + 4) : 0;
    text.setAttribute('y', yOff);
    text.textContent = i === 0 ? `${node.emoji} ${line}` : line;
    g.appendChild(text);
  });

  svg.appendChild(g);
}

function renderTree(node, parent) {
  if (parent) drawLink(parent, node);
  if (node.children) node.children.forEach(c => renderTree(c, node));
  drawNode(node); // draw nodes on top of links
}

function render(data) {
  svg.innerHTML = '';
  computeHeight(data, 0);
  assignPositions(data, 60, 0);
  renderTree(data, null);

  const b = getBounds(data);
  const pad = 40;
  viewBox.x = b.minX - pad;
  viewBox.y = b.minY - pad;
  viewBox.w = (b.maxX - b.minX) + pad * 2;
  viewBox.h = (b.maxY - b.minY) + pad * 2;
  viewBox._default = { ...viewBox };
  updateViewBox();
}

function zoomIn()  { viewBox.w *= 0.8; viewBox.h *= 0.8; updateViewBox(); }
function zoomOut() { viewBox.w *= 1.25; viewBox.h *= 1.25; updateViewBox(); }
function resetView() { if (viewBox._default) Object.assign(viewBox, viewBox._default); updateViewBox(); }

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.tab.${tab}`).classList.add('active');
  render(tab === 'single' ? singleData : chainData);
}

render(singleData);

// Pan & Zoom
let isPanning = false, sx, sy;
svg.addEventListener('mousedown', e => { isPanning = true; sx = e.clientX; sy = e.clientY; });
svg.addEventListener('mousemove', e => {
  if (!isPanning) return;
  viewBox.x -= (e.clientX - sx) * (viewBox.w / svg.clientWidth);
  viewBox.y -= (e.clientY - sy) * (viewBox.h / svg.clientHeight);
  updateViewBox(); sx = e.clientX; sy = e.clientY;
});
svg.addEventListener('mouseup', () => isPanning = false);
svg.addEventListener('mouseleave', () => isPanning = false);
svg.addEventListener('wheel', e => {
  e.preventDefault();
  const f = e.deltaY > 0 ? 1.1 : 0.9;
  const mx = viewBox.x + (e.offsetX / svg.clientWidth) * viewBox.w;
  const my = viewBox.y + (e.offsetY / svg.clientHeight) * viewBox.h;
  viewBox.w *= f; viewBox.h *= f;
  viewBox.x = mx - (e.offsetX / svg.clientWidth) * viewBox.w;
  viewBox.y = my - (e.offsetY / svg.clientHeight) * viewBox.h;
  updateViewBox();
});
</script>
